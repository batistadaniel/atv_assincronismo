<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucar CEP - Async/Await</title>
</head>
<body>
    <div class="content" style="display: flex; flex-direction: column; width: 200px; gap: 6px">
        <h1>Bucar CEP</h1>

        <input type="text" name="cep" id="cep" placeholder="Digite seu CEP">
        <button type="button" onclick="buscarCEP()">Pesquisar CEP</button>
        <input type="text" id="logradouro" placeholder="Logradouro">
        <input type="text" id="complemento" placeholder="Complemento">
        <input type="text" id="bairro" placeholder="Bairro">
        <input type="text" id="localidade" placeholder="Cidade">
        <input type="text" id="uf" placeholder="UF">
    </div>

    <script>
        async function buscarCEP () {

            let cep =  document.getElementById("cep").value; 

            try {
                let cep = document.getElementById("cep").value;

                const resposta = await fetch( "https://viacep.com.br/ws/"+ cep +"/json/"
                );

                const dados = await resposta.json();
                // exibe mudanças no valor
                document.getElementById("logradouro").value = dados.logradouro;
                document.getElementById("complemento").value = dados.complemento;
                document.getElementById("bairro").value = dados.bairro;
                document.getElementById("localidade").value = dados.localidade;
                document.getElementById("uf").value = dados.uf;
            } catch(erro) { 
                console.log("Erro:", erro);
            };
        }
    </script>
</body>
</html>
