<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucar CEP - XmlHttpRequest</title>
</head>
<body>
    <div class="content" style="display: flex; flex-direction: column; width: 200px; gap: 6px">
        <h1>Bucar CEP</h1>

        <input type="text" name="cep" id="cep" placeholder="Digite seu CEP">
        <button type="button" onclick="buscarCEP()">Pesquisar CEP</button>
        <input type="text" id="logradouro" placeholder="Logradouro">
        <input type="text" id="complemento" placeholder="Complemento">
        <input type="text" id="bairro" placeholder="Bairro">
        <input type="text" id="localidade" placeholder="Cidade">
        <input type="text" id="uf" placeholder="UF">
    </div>

    <script>
        function buscarCEP () {
            let cep =  parseInt(document.getElementById("cep").value); 

            // cria o objeto que sera usado na chamada ajax
            var xhttp = new XMLHttpRequest();

            // prepara o tratamento da resposta
            xhttp.onreadystatechange = function() {
                // exibe mudancas no valor do readyState
                console.log(this.readyState);
                // readState 4 = resposta recebida
                // status 200 = resposta OK
                if (this.readyState == 4 && this.status == 200) {

                let endereco = JSON.parse(this.responseText); 
                // console.log envia mensagens que serao exibidas no console do navegador
                console.log('resposta recebida - status OK');
                console.log(this.responseText);
                document.getElementById("logradouro").value=endereco.logradouro;
                document.getElementById("complemento").value=endereco.complemento ;
                document.getElementById("bairro").value=endereco.bairro;
                document.getElementById("localidade").value=endereco.localidade;
                document.getElementById("uf").value=endereco.uf;
                // document.getElementById("demo").innerHTML = this.responseText;
                }
            };
            // prepara a solicitacao
            xhttp.open("GET", "https://viacep.com.br/ws/"+cep+"/json", true);
            // envia a solicitacao
            xhttp.send();
        }
    </script>
</body>
</html>
